<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dan Fachin — Let's Connect!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --warm-cream: #FFF8F0;
    --soft-peach: #FFECD2;
    --warm-terra: #C4704B;
    --deep-walnut: #5C3D2E;
    --gentle-sage: #7BA68C;
    --sage-hover: #6B9479;
    --sky-soft: #8BBAD0;
    --sky-hover: #79A9BF;
    --text-primary: #3D2B1F;
    --text-secondary: #7A6254;
    --card-shadow: 0 8px 32px rgba(92, 61, 46, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-cream);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
  }

  /* warm gradient strip at top */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(180deg, var(--soft-peach) 0%, var(--warm-cream) 100%);
    z-index: -1;
  }

  .container {
    max-width: 420px;
    width: 100%;
    padding: 48px 0 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* avatar circle */
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--warm-terra), var(--gentle-sage));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 40px;
    font-weight: 700;
    color: white;
    margin-bottom: 20px;
    box-shadow: 0 4px 16px rgba(196, 112, 75, 0.25);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--deep-walnut);
    margin-bottom: 6px;
    text-align: center;
  }

  .subtitle {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 28px;
    text-align: center;
    line-height: 1.5;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%;
    box-shadow: var(--card-shadow);
    margin-bottom: 24px;
  }

  .greeting {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--deep-walnut);
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .message {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .cta-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 24px;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
    border: none;
  }

  .cta-primary {
    background: var(--gentle-sage);
    color: white;
  }
  .cta-primary:hover {
    background: var(--sage-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(123, 166, 140, 0.35);
  }

  .cta-secondary {
    background: var(--sky-soft);
    color: white;
  }
  .cta-secondary:hover {
    background: var(--sky-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(139, 186, 208, 0.35);
  }

  .cta-tertiary {
    background: transparent;
    color: var(--warm-terra);
    border: 2px solid var(--soft-peach);
  }
  .cta-tertiary:hover {
    background: var(--soft-peach);
    transform: translateY(-1px);
  }

  .cta svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .footer {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    opacity: 0.6;
    padding-bottom: 32px;
  }

  /* subtle entrance animation */
  .container > * {
    animation: fadeUp 0.5s ease both;
  }
  .avatar { animation-delay: 0.05s; }
  h1 { animation-delay: 0.1s; }
  .subtitle { animation-delay: 0.15s; }
  .card { animation-delay: 0.2s; }
  .footer { animation-delay: 0.3s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="avatar">D</div>
  <h1>Dan Fachin</h1>
  <p class="subtitle">Caia &amp; Jamie's Dad</p>

  <div class="card">
    <p class="greeting">Hey! Thanks for scanning.</p>
    <p class="message">
      I'm always looking to connect with other parents for playdates and
      good times. Tap below to reach me — I'd love to set something up!
    </p>

    <div class="cta-group">
      <!-- ========================================
           REPLACE THE PHONE AND EMAIL BELOW
           ======================================== -->

      <a href="sms:+16137954232" class="cta cta-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Text Me

      <a href="mailto:danfachin@gmail.com?subject=Playdate!&body=Hi Dan!" class="cta cta-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="16" x="2" y="4" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        Email Me

      <!-- FUTURE: Uncomment when Google appointment slots are live

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
          <line x1="16" x2="16" y1="2" y2="6"/>
          <line x1="8" x2="8" y1="2" y2="6"/>
          <line x1="3" x2="21" y1="10" y2="10"/>
        </svg>
        Book a Playdate
      </a>
      -->

    </div>
  </div>

  <p class="footer">Richmond, ON</p>

</div>
</body>
</html>
